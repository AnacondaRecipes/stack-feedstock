{% set name = "stack" %}
{% set version = "3.7.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/commercialhaskell/{{ name }}/releases/download/v{{ version }}/{{ name }}-{{ version }}-linux-x86_64.tar.gz  # [linux and x86]
  sha256: b6df9168d471d917d955ee80553562ca2b0b3b1aa61cd1256199406c2d8c4eb4  # [linux and x86]
  url: https://github.com/commercialhaskell/{{ name }}/releases/download/v{{ version }}/{{ name }}-{{ version }}-linux-aarch64.tar.gz  # [linux and aarch64]
  sha256: 752321c6af6bc88960a086ebd9ede72937a567f312842a29deb2ddc9ab316a20  # [linux and aarch64]
  url: https://github.com/commercialhaskell/{{ name }}/releases/download/v{{ version }}/{{ name }}-{{ version }}-osx-aarch64.tar.gz  # [osx and arm64]
  sha256: 9943acbcc791f474d8c68493082308509ec8a8f4603039cf0f7639293d13a233  # [osx and arm64]
  url: https://github.com/commercialhaskell/{{ name }}/releases/download/v{{ version }}/{{ name }}-{{ version }}-windows-x86_64.tar.gz  # [win]
  sha256: 44a51881cbd6e6810568d8851b7bd6f4b2912b814496b8f4639b195eabea298a  # [win]

build:
  number: 0

requirements:
  run:
    - {{ stdlib('c') }}      # [linux]
    - {{ compiler('c') }}    # [linux]
    - {{ compiler('cxx') }}  # [linux]
    - gmp                    # [linux]
    - make                   # [linux]
    - ncurses                # [linux]
    - perl                   # [linux]

about:
  home: https://www.haskellstack.org
  license: LGPL-3.0-only
  license_family: LGPL
  license_file: LICENSE
  summary: Stack is a cross-platform program for developing Haskell projects.
  description: |
    Stack is a program for developing Haskell projects. It is aimed at new and 
    experienced users of Haskell and seeks to support them fully on Linux, macOS and Windows.
  doc_url: https://docs.haskellstack.org/README
  dev_url: https://github.com/commercialhaskell/stack

extra:
  recipe-maintainers:
    - eggzilla
    - LaurentRDC
